<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#7ec8f7"/>
      <stop offset="100%" stop-color="#1E9BF0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text
    x="50" y="80"
    text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="82"
    font-weight="900"
    fill="url(#rg)"
    filter="url(#glow)"
  >R</text>
</svg>
